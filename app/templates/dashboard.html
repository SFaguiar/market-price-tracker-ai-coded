{% extends "base.html" %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row md:items-end justify-between">
    <div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-neon-blue to-neon-purple bg-clip-text text-transparent">Decisão de Compras</h1>
        <p class="text-slate-400 mt-1">Pesquise preços e compare cestas básicas para economizar na região.</p>
    </div>
</div>

<!-- Barra de Pesquisa Hero -->
<div class="glass-panel p-6 rounded-2xl mb-8 border-t-4 border-neon-blue">
    <h2 class="text-xl font-bold text-white mb-4">O que você quer comprar hoje?</h2>
    <div class="relative">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <input type="text" id="input-search" class="bg-slate-800 border border-slate-700 text-white text-lg rounded-lg focus:ring-neon-blue focus:border-neon-blue block w-full pl-10 p-4" placeholder="Ex: Leite, Arroz, Café..." autocomplete="off">
    </div>
    
    <!-- Resultados da Busca -->
    <div id="search-results" class="mt-4 hidden">
        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-3">Ranking de Preços</h3>
        <div class="space-y-3" id="search-list">
            <!-- Injetado via JS -->
        </div>
    </div>
</div>

<!-- Comparativo de Cestas Básicas -->
<div class="mb-8">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
            <i class="fa-solid fa-basket-shopping text-neon-purple"></i>
            Ranking de Cestas Básicas
        </h2>
        <div class="flex gap-2 bg-slate-800 p-1 rounded-lg border border-slate-700">
            <button id="tab-simples" class="px-4 py-1.5 rounded text-sm font-medium transition-colors bg-neon-purple text-white shadow">Simples</button>
            <button id="tab-completa" class="px-4 py-1.5 rounded text-sm font-medium text-slate-400 hover:text-white transition-colors">Completa</button>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cestas-grid">
        <!-- Skeleton Loading -->
        <div class="glass-panel p-6 rounded-2xl animate-pulse">
            <div class="h-4 bg-slate-700 rounded w-1/2 mb-4"></div>
            <div class="h-8 bg-slate-700 rounded w-3/4 mb-2"></div>
            <div class="h-3 bg-slate-700 rounded w-full mt-4"></div>
        </div>
        <div class="glass-panel p-6 rounded-2xl animate-pulse">
            <div class="h-4 bg-slate-700 rounded w-1/2 mb-4"></div>
            <div class="h-8 bg-slate-700 rounded w-3/4 mb-2"></div>
            <div class="h-3 bg-slate-700 rounded w-full mt-4"></div>
        </div>
    </div>
</div>

{% endblock %}
