<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Price Tracker</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0f172a',    // Slate 900
                            card: '#1e293b',  // Slate 800
                            border: 'rgba(255,255,255,0.1)'
                        },
                        neon: {
                            blue: '#3b82f6',
                            purple: '#8b5cf6',
                            green: '#10b981',
                            red: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base styles that are hard to do with inline classes */
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-panel {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Custom Scrollbar for tables */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        /* Safe Area padding for modern mobiles (e.g. iPhone Notch/Home Indicator) */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased selection:bg-neon-blue selection:text-white">

    <!-- Sidebar -->
    <aside class="w-64 glass-panel border-r border-dark-border flex flex-col hidden md:flex z-10 shrink-0">
        <div class="p-6 flex items-center gap-3 font-bold text-xl text-white mb-4">
            <svg class="w-6 h-6 text-neon-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            Market Tracker
        </div>
        
        <nav class="flex flex-col gap-2 px-4 flex-1">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors {% if request.url.path == '/' %}bg-neon-blue/10 text-neon-blue{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <a href="/compras/novo" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors {% if request.url.path == '/compras/novo' %}bg-neon-blue/10 text-neon-blue{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Bancada (Nova)
            </a>
            <a href="/historico" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors {% if request.url.path == '/historico' %}bg-neon-blue/10 text-neon-blue{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Histórico
            </a>
            
            <div class="mt-8 mb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Sistema</div>
            
            <a href="/config" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors {% if request.url.path == '/config' %}bg-neon-blue/10 text-neon-blue{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Cadastros
            </a>
            
            <a href="/docs" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-white mt-auto mb-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                API REST
            </a>
        </nav>
    </aside>

    <!-- Main Content (Scrollable) -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative pb-24 md:pb-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Mobile Bottom Navigation (Visible only on sm) -->
    <nav class="md:hidden fixed bottom-0 w-full glass-panel border-t border-dark-border z-50 flex justify-around items-center pb-safe">
        <a href="/" class="flex flex-col items-center gap-1 p-3 transition-colors {% if request.url.path == '/' %}text-neon-blue{% else %}text-slate-400 hover:text-white{% endif %}">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            <span class="text-[10px] font-medium">Painel</span>
        </a>
        <a href="/compras/novo" class="relative flex flex-col items-center p-3">
            <div class="absolute -top-5 bg-neon-blue text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/50 border-4 border-[#0f172a]">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="text-[10px] font-medium text-neon-blue mt-6">Lançar</span>
        </a>
        <a href="/historico" class="flex flex-col items-center gap-1 p-3 transition-colors {% if request.url.path == '/historico' %}text-neon-blue{% else %}text-slate-400 hover:text-white{% endif %}">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-medium">Histórico</span>
        </a>
    </nav>

    <!-- Global App Logic -->
    <script src="/static/js/app.js"></script>
</body>
</html>
