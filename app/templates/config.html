{% extends "base.html" %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row md:items-end justify-between">
    <div>
        <h1 class="text-3xl font-bold text-white">Cadastros Mestre</h1>
        <p class="text-slate-400 mt-1">Gerencie a integridade do catálogo de Mercados e Produtos.</p>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <!-- Cadastro de Mercado -->
    <div class="glass-panel p-6 rounded-2xl border border-dark-border">
        <h3 class="text-xl font-semibold text-slate-200 mb-6 flex items-center gap-2">
            <svg class="w-6 h-6 text-neon-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            Novo Estabelecimento
        </h3>
        
        <form id="form-novo-mercado" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Nome</label>
                <input type="text" name="nome" required placeholder="Ex: Supermercado Extra" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Tipo de Comércio</label>
                <select name="tipo" required class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
                    <option value="">Selecione...</option>
                    <option value="Atacado">Atacado</option>
                    <option value="Supermercado">Supermercado</option>
                    <option value="Mercado de Bairro">Mercado de Bairro</option>
                    <option value="Feira">Feira</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Endereço</label>
                <input type="text" name="endereco" placeholder="Ex: Av. Brasil, 1500 - Centro" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Cidade</label>
                    <input type="text" name="cidade" placeholder="Ex: Belo Horizonte" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Estado (UF)</label>
                    <input type="text" name="estado" maxlength="2" placeholder="Ex: MG" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors" style="text-transform: uppercase;">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Latitude <span class="text-slate-600">(opcional)</span></label>
                    <input type="number" name="latitude" step="any" placeholder="Ex: -19.9167" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Longitude <span class="text-slate-600">(opcional)</span></label>
                    <input type="number" name="longitude" step="any" placeholder="Ex: -43.9345" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-blue transition-colors">
                </div>
            </div>
            
            <button type="submit" class="w-full mt-4 bg-neon-blue hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                Salvar Mercado
            </button>
        </form>
    </div>

    <!-- Cadastro de Produto -->
    <div class="glass-panel p-6 rounded-2xl border border-dark-border">
        <h3 class="text-xl font-semibold text-slate-200 mb-6 flex items-center gap-2">
            <svg class="w-6 h-6 text-neon-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
            Novo Produto (Catálogo)
        </h3>
        
        <form id="form-novo-produto" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Tipo <span class="text-neon-purple">*</span></label>
                    <input type="text" name="tipo" required placeholder="Ex: Arroz" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Subtipo</label>
                    <input type="text" name="subtipo" placeholder="Ex: Integral Tipo 1" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Marca <span class="text-neon-purple">*</span></label>
                    <input type="text" name="marca" required placeholder="Ex: Tio João" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Categoria <span class="text-neon-purple">*</span></label>
                    <input type="text" name="categoria" required placeholder="Ex: Mercearia" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Conteúdo Embalagem <span class="text-neon-purple">*</span></label>
                    <input type="number" name="conteudo_embalagem" required step="0.001" min="0.001" placeholder="Ex: 5 (kg), 12 (un)" class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Unidade <span class="text-neon-purple">*</span></label>
                    <select name="unidade_medida" required class="w-full bg-slate-900 border border-dark-border rounded-lg px-4 py-2 text-white focus:outline-none focus:border-neon-purple transition-colors">
                        <option value="">Selecione...</option>
                        <option value="kg">Quilograma (kg)</option>
                        <option value="g">Grama (g)</option>
                        <option value="l">Litro (L)</option>
                        <option value="ml">Mililitro (ml)</option>
                        <option value="un">Unidade (un)</option>
                    </select>
                </div>
            </div>
            
            <p class="text-xs text-slate-500 mt-2 mb-4">
                Nota: Preço e Quantidade variam a cada ida ao mercado. Eles serão preenchidos na aba "Bancada".
            </p>
            
            <button type="submit" class="w-full bg-neon-purple hover:bg-purple-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                Salvar Produto
            </button>
        </form>
    </div>

</div>
{% endblock %}
